name: Run Python Basics Integration and Unit Tests
on:
  pull_request:
    types: [opened, reopened, synchronize]
concurrency:
  group: tests-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
env:
  ANDROID_HOME: ""
  ANDROID_SDK_ROOT: ""
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  root_workspace_tests:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: coverage
            run: |
              bazel test //coverage/tests:all
          - name: plantuml
            run: |
              bazel build //plantuml/... --config=clippy
              bazel test //plantuml/...
          - name: validation
            run: |
              bazel build //validation/... --config=clippy
              bazel test //validation/...
          - name: mod_deps
            run: |
              bazel mod deps --lockfile_mode=update
          - name: libclang
            run: |
              bazel build //cpp/libclang/... --config=clippy
              bazel test //cpp/libclang/...
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Free Disk Space (Ubuntu)
        uses: eclipse-score/more-disk-space@v1
        with:
          level: 4
      - uses: castler/setup-bazel@cache-optimized
        with:
          bazelisk-cache: true
          disk-cache: root_workspace_tests-${{ matrix.name }}
          repository-cache: true
          cache-optimized: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}
      - name: Run ${{ matrix.name }}
        run: ${{ matrix.run }}
  integration_tests:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Free Disk Space (Ubuntu)
        uses: eclipse-score/more-disk-space@v1
        with:
          level: 4
      - uses: castler/setup-bazel@cache-optimized
        with:
          bazelisk-cache: true
          disk-cache: integration_tests
          repository-cache: true
          cache-optimized: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}
      - name: Run python_basics integration tests
        run: |
          cd python_basics/integration_tests
          bazel test //...
      - name: Run starpls integration tests
        run: |
          cd starpls/integration_tests
          bazel test //...
      - name: Run cr_checker unit tests
        run: |
          cd cr_checker/tests
          bazel test //...
  rules_score_tests:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rules_score
            run: |
              cd bazel/rules/rules_score/test
              bazel test //...
          - name: seooc_example
            run: |
              cd bazel/rules/rules_score/examples/seooc
              bazel build //...
              bazel test //...
          - name: some_other_library_example
            run: |
              cd bazel/rules/rules_score/examples/some_other_library
              bazel build //...
              bazel test //...
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Free Disk Space (Ubuntu)
        uses: eclipse-score/more-disk-space@v1
        with:
          level: 4
      - uses: castler/setup-bazel@cache-optimized
        with:
          bazelisk-cache: true
          disk-cache: rules_score_tests-${{ matrix.name }}
          repository-cache: true
          cache-optimized: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}
      - name: Run ${{ matrix.name }}
        run: ${{ matrix.run }}
