# Sysroot for hermetic docs tooling. It provides graphviz `dot` plus fakechroot,
# so //third_party/docs_runtime:dot can execute /usr/bin/dot fully from sysroot.
#
# Run `bazel run @docs_runtime//:lock` whenever you change this file, then commit
# the regenerated docs_runtime.lock.json.
#
# Pinned to the Ubuntu 24.04 (noble) snapshot so package closure is reproducible.
version: 1
sources:
  - channel: noble main universe
    url: https://snapshot.ubuntu.com/ubuntu/20260401T000000Z
  - channel: noble-security main universe
    url: https://snapshot.ubuntu.com/ubuntu/20260401T000000Z
  - channel: noble-updates main universe
    url: https://snapshot.ubuntu.com/ubuntu/20260401T000000Z
archs:
  - "amd64"
packages:
  - "graphviz" # /usr/bin/dot and plugins used by Sphinx + PlantUML
  - "fakechroot" # /usr/bin/fakechroot + libfakechroot.so for exec_in_sysroot
